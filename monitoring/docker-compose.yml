services:
  prometheus:
    image: prom/prometheus
    container_name: prometheus
    command:
    - --config.file=/etc/prometheus/prometheus.yml
    - --web.enable-lifecycle
    volumes:
    - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    - ./prometheus/rules:/etc/prometheus/rules
    ports:
    - 9090:9090
  alertmanager:
    image: prom/alertmanager
    container_name: alertmanager
    volumes:
    - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    ports:
    - 9093:9093
  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
    - 3000:3000
    volumes:
    - grafana_data:/var/lib/grafana
  node_exporter:
    image: prom/node-exporter
    container_name: node_exporter
    ports:
    - 9100:9100
  redis:
    image: redis:7
    container_name: redis
    ports:
    - 6379:6379
  redis_exporter:
    image: oliver006/redis_exporter
    container_name: redis_exporter
    environment:
    - REDIS_ADDR=redis://redis:6379
    ports:
    - 9121:9121
  redis_history_exporter:
    image: oliver006/redis_exporter
    container_name: redis_history_exporter
    environment:
    - REDIS_ADDR=redis://redis-history:6379
    ports:
    - 9122:9121
    depends_on:
    - redis-history
  redis-history:
    image: redis:7
    container_name: redis-history
    ports:
    - 6380:6379
    volumes:
    - redis_history_data:/data
    command: redis-server --save 60 1 --loglevel warning
    restart: unless-stopped
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
    - 5672:5672
    - 15672:15672
  rabbitmq_exporter:
    image: kbudde/rabbitmq-exporter
    container_name: rabbitmq_exporter
    environment:
    - RABBIT_URL=http://rabbitmq:15672
    - RABBIT_USER=guest
    - RABBIT_PASSWORD=guest
    ports:
    - 9419:9419
  blackbox_exporter:
    image: prom/blackbox-exporter
    container_name: blackbox_exporter
    ports:
    - 9115:9115
    volumes:
    - ./exporters/blackbox.yml:/etc/blackbox_exporter/config.yml
    command:
    - --config.file=/etc/blackbox_exporter/config.yml
  gateway:
    image: nginx:alpine
    container_name: gateway
    ports:
    - 8080:80
  n8n:
    image: n8nio/n8n
    container_name: n8n
    ports:
    - 5678:5678
    volumes:
    - n8n_data:/home/node/.n8n
    environment:
    - N8N_HOST=n8n
    - N8N_PORT=5678
    - N8N_PROTOCOL=http
  decision-engine:
    build: ../decision-engine
    container_name: decision-engine
    ports:
    - 8000:8000
    volumes:
    - ../decision-engine/app:/app
    environment:
    - REDIS_URL=redis://redis-history:6379/0
    depends_on:
    - prometheus
    - alertmanager
    - redis-history
  action-executor:
    build: ../action-executor
    container_name: action-executor
    ports:
    - 8001:8001
    volumes:
    - /var/run/docker.sock:/var/run/docker.sock
    environment:
    - ACTION_EXECUTOR_SECRET=${ACTION_EXECUTOR_SECRET}
    restart: unless-stopped
  docker-agent:
    build: ../agent
    container_name: docker-agent
    ports:
    - 8002:8002
    volumes:
    - /var/run/docker.sock:/var/run/docker.sock
    - ./docker-compose.yml:/monitoring/docker-compose.yml
    - ../decision-engine/app/rules.py:/decision-engine/app/rules.py
    - ../action-executor/main.py:/action-executor/main.py
    - ./prometheus/prometheus.yml:/monitoring/prometheus/prometheus.yml
    - ./prometheus/rules:/monitoring/prometheus/rules
    environment:
    - PROMETHEUS_URL=http://prometheus:9090
    restart: unless-stopped
    depends_on:
    - prometheus
  docker-watcher:
    build: ../docker-watcher
    container_name: docker-watcher
    volumes:
    - /var/run/docker.sock:/var/run/docker.sock
    - ../decision-engine/app/rules.py:/rules/rules.py
    - ../action-executor/main.py:/action/main.py
    - ./prometheus/prometheus.yml:/prometheus/prometheus.yml
    - ./prometheus/rules:/prometheus/rules
    environment:
    - PROMETHEUS_URL=http://prometheus:9090
    restart: unless-stopped
    depends_on:
    - decision-engine
    - action-executor
    - prometheus
  test-agent:
    image: nginx:latest
    container_name: test-agent
    ports:
    - 5665:80
    labels:
    - monitoring.port=80
    - monitoring.probe=http
    restart: unless-stopped
  evolution-postgres:
    image: postgres:16-alpine
    container_name: evolution-postgres
    environment:
    - POSTGRES_DB=evolution
    - POSTGRES_USER=evolution
    - POSTGRES_PASSWORD=evo-pass
    volumes:
    - evolution_postgres:/var/lib/postgresql/data
    restart: unless-stopped
  evolution-api:
    image: atendai/evolution-api:v1.8.2
    container_name: evolution-api
    ports:
    - 8083:8080
    volumes:
    - evolution_instances:/evolution/instances
    environment:
    - SERVER_URL=http://192.168.193.138:8083
    - AUTHENTICATION_API_KEY=evo-secret
    - STORE_CLEANING_INTERVAL=7200
    - STORE_MESSAGE=true
    - STORE_CONTACTS=true
    restart: unless-stopped
    depends_on:
    - redis
    - evolution-postgres
  rana:
    image: nginx:latest
    container_name: rana
    ports:
    - 5656:80
    labels:
    - monitoring.port=80
    - monitoring.probe=http
    restart: unless-stopped

volumes:
  n8n_data:
    external: true
  grafana_data:
    external: true
    name: pfe-monitoring_grafana_data
  redis_history_data: null
  evolution_instances: null
  evolution_postgres: null
